name: Provider data audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      HEALTHPOINT_API_URL: ${{ secrets.HEALTHPOINT_API_URL }}
      HEALTHPOINT_API_TOKEN: ${{ secrets.HEALTHPOINT_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check scripts
        run: |
          node --check script.js
          for file in tools/*.mjs; do node --check "$file"; done
          for file in tests/*.mjs; do node --check "$file"; done

      - name: Run provider data validation
        run: node tools/validate-provider-data.mjs

      - name: Audit provider source fit
        run: node tools/audit-provider-source-fit.mjs

      - name: Run unit and workflow tests
        run: node --test tests/*.test.mjs

      - name: Refresh approved provider data
        run: node tools/refresh-provider-database.mjs

      - name: Discover unavailable provider candidates
        run: node tools/find-unavailable-providers.mjs

      - name: Audit unavailable provider watchlist
        run: node tools/audit-availability-watchlist.mjs

      - name: Check unavailable provider watchlist
        run: node tools/check-provider-availability.mjs

      - name: Check provider links
        run: node tools/check-links.mjs

      - name: Upload refresh report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-refresh-report
          path: data/reports/provider-refresh-report.json

      - name: Upload availability monitor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-availability-monitor
          path: data/reports/provider-availability-monitor.json

      - name: Upload unavailable candidate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-unavailable-candidates
          path: data/reports/provider-unavailable-candidates.json

      - name: Upload provider source-fit audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-source-fit-audit
          path: |
            data/provider-source-fit-audit.json
            PROVIDER_SOURCE_FIT_AUDIT.md
