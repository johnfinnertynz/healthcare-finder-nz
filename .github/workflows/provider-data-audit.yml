name: Provider data audit

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 20 * * 0"

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      HEALTHPOINT_API_URL: ${{ secrets.HEALTHPOINT_API_URL }}
      HEALTHPOINT_API_TOKEN: ${{ secrets.HEALTHPOINT_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check scripts
        run: node tools/check-syntax.mjs

      - name: Run provider data validation
        run: node tools/validate-provider-data.mjs

      - name: Audit provider source fit
        run: node tools/audit-provider-source-fit.mjs

      - name: Audit provider availability freshness
        run: node tools/audit-provider-availability.mjs

      - name: Audit psychiatrist referral metadata
        run: node tools/audit-psychiatrist-referrals.mjs

      - name: Run unit and workflow tests
        run: node --test tests/*.test.mjs

      - name: Refresh approved provider data
        if: github.event_name != 'pull_request'
        run: node tools/refresh-provider-database.mjs

      - name: Discover unavailable provider candidates
        if: github.event_name != 'pull_request'
        run: node tools/find-unavailable-providers.mjs

      - name: Audit unavailable provider watchlist
        run: node tools/audit-availability-watchlist.mjs

      - name: Cautiously recheck provider availability watchlist
        if: github.event_name != 'pull_request'
        run: node tools/recheck-provider-availability.mjs

      - name: Check provider links
        if: github.event_name != 'pull_request'
        run: node tools/check-links.mjs

      - name: Upload refresh report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-refresh-report
          path: data/reports/provider-refresh-report.json

      - name: Upload availability monitor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-availability-recheck
          path: data/provider-availability-recheck-results.json

      - name: Upload provider availability audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-availability-audit
          path: |
            data/provider-availability-audit.json
            AVAILABILITY_RECHECK_REPORT.md

      - name: Upload unavailable candidate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-unavailable-candidates
          path: data/reports/provider-unavailable-candidates.json

      - name: Upload provider source-fit audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-source-fit-audit
          path: |
            data/provider-source-fit-audit.json
            PROVIDER_SOURCE_FIT_AUDIT.md

      - name: Upload psychiatrist referral audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psychiatrist-referral-audit
          path: |
            data/provider-psychiatrist-referral-audit.json
            PSYCHIATRIST_REFERRAL_AUDIT.md
